<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<h1>Student Registration Form</h1>

<form>

    <fieldset>
        <legend>Personal Information</legend>

        <label>Full Name:</label>
        <input type="text" placeholder="Enter your full name"><br><br>

        <label>Email:</label>
        <input type="email" placeholder="example@gmail.com"><br><br>

        <label>Password:</label>
        <input type="password"><br><br>

        <label>Phone Number:</label>
        <input type="tel" placeholder="9876543210"><br><br>

        <label>Age:</label>
        <input type="number"><br><br>

        <label>Portfolio Website:</label>
        <input type="url" placeholder="https://yourwebsite.com"><br><br>
    </fieldset>

    <br>

    <fieldset>
        <legend>Date & Time Details</legend>

        <label>Date of Birth:</label>
        <input type="date"><br><br>

        <label>Preferred Time:</label>
        <input type="time"><br><br>

        <label>Meeting Date & Time:</label>
        <input type="datetime-local"><br><br>
    </fieldset>

    <br>

    <fieldset>
        <legend>Gender</legend>

        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
    </fieldset>

    <br>

    <fieldset>
        <legend>Hobbies</legend>

        <input type="checkbox"> Cricket <br>
        <input type="checkbox"> Football <br>
        <input type="checkbox"> Music <br>
        <input type="checkbox"> coding <br>
    </fieldset>

    <br>

    <fieldset>
        <legend>Education Details</legend>

        <label>Country:</label>
        <select>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
        </select>
    </fieldset>

    <br>

    <input type="submit" value="Register">
    <input type="reset" value="Reset">

</form>

</body>
</html>
